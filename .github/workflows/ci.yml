name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  CARGO_TERM_COLOR: always
  MACOSX_DEPLOYMENT_TARGET: "15.0"

jobs:
  rust:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          rustflags: ""
          cache: true

      - name: Format
        run: cargo fmt --check

      - name: Test
        run: cargo test

      - name: Release build
        run: cargo build --release

  macos-bundle:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: aarch64-apple-darwin
          rustflags: ""
          cache: true

      - name: Install bundle dependencies
        run: |
          brew install molten-vk freetype libpng
          cargo install cargo-bundle

      - name: Build unsigned macOS bundle
        run: |
          cargo build --release --no-default-features -v --target=aarch64-apple-darwin
          mv target/aarch64-apple-darwin/release/gopher64 target/aarch64-apple-darwin/release/gopher64-cli
          cargo bundle --release --target=aarch64-apple-darwin --format osx
          cp target/aarch64-apple-darwin/release/gopher64-cli target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/MacOS/gopher64-cli
          install_name_tool -change /opt/homebrew/opt/freetype/lib/libfreetype.6.dylib \
            @executable_path/../Frameworks/libfreetype.6.dylib target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/MacOS/gopher64
          install_name_tool -change /opt/homebrew/opt/freetype/lib/libfreetype.6.dylib \
            @executable_path/../Frameworks/libfreetype.6.dylib target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/MacOS/gopher64-cli
          install_name_tool -change /opt/homebrew/opt/libpng/lib/libpng16.16.dylib \
            @executable_path/../Frameworks/libpng16.16.dylib target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/Frameworks/libfreetype.6.dylib

      - name: Verify bundle
        run: |
          test -d target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app
          test -x target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/MacOS/gopher64
          test -x target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/MacOS/gopher64-cli
          test -f target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/Frameworks/libMoltenVK.dylib
          test -f target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/Frameworks/libfreetype.6.dylib
          test -f target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/Frameworks/libpng16.16.dylib
          /usr/libexec/PlistBuddy -c "Print :CFBundleName" target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/Info.plist | grep -x Cinder64
          /usr/libexec/PlistBuddy -c "Print :CFBundleIdentifier" target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app/Contents/Info.plist | grep -x com.patricedery.Cinder64
          codesign -f --entitlements data/macos/entitlements_dev.plist --deep --timestamp --options runtime -s - target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app

      - name: Upload bundle
        uses: actions/upload-artifact@v7
        with:
          name: Cinder64-macos-aarch64
          path: target/aarch64-apple-darwin/release/bundle/osx/Cinder64.app
